<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Tracker | FSI · VOF · ML-for-CFD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <!-- Hero -->
    <header class="hero">
      <div class="hero-content">
        <h1>Paper Tracker</h1>
        <p class="subtitle">FSI &middot; Multiphase VOF &middot; ML-for-CFD</p>
        <p class="date-line" id="date-line"></p>
      </div>
      <div class="hero-stats" id="hero-stats">
        <div class="stat">
          <span class="stat-num" id="stat-total">--</span>
          <span class="stat-label">papers</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="stat-sources">7</span>
          <span class="stat-label">sources</span>
        </div>
      </div>
    </header>

    <!-- Source Filter Tabs -->
    <nav class="tabs" id="source-tabs">
      <button class="tab active" data-source="all">All</button>
    </nav>

    <!-- Papers Feed -->
    <main id="feed">
      <div class="loading-state" id="global-loader">
        <div class="spinner"></div>
        <p>Fetching latest papers...</p>
      </div>
    </main>

    <!-- Manual Add (collapsed) -->
    <section class="card collapsible">
      <button class="collapse-toggle" id="add-toggle">+ Add Paper Manually</button>
      <div class="collapse-body" id="add-body">
        <form id="paper-form">
          <input type="text" id="paper-title" placeholder="Paper title" required>
          <input type="text" id="paper-authors" placeholder="Authors (e.g. Smith et al.)">
          <input type="url"  id="paper-link" placeholder="Link (https://...)">
          <select id="paper-topic">
            <option value="FSI">FSI</option>
            <option value="VOF">VOF</option>
            <option value="ML-CFD">ML-for-CFD</option>
            <option value="Contact Line">Contact Line</option>
            <option value="Immersed Boundary">Immersed Boundary</option>
            <option value="Other">Other</option>
          </select>
          <button type="submit">Save Paper</button>
        </form>
      </div>
    </section>

    <!-- Saved Papers -->
    <section class="card" id="saved-section" style="display:none">
      <h2>My Saved Papers</h2>
      <div id="paper-list"></div>
    </section>

    <!-- Search Queries -->
    <section class="card collapsible">
      <button class="collapse-toggle" id="queries-toggle">Scholar Alert Queries (click to copy)</button>
      <div class="collapse-body" id="queries-body">
        <div id="query-chips" class="chip-row"></div>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
